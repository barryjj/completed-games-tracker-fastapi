<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{% endblock %} — Completed Games Tracker</title>
  <!-- Restore saved theme before first paint to avoid flash -->
  <script>const t=localStorage.getItem('theme');if(t)document.documentElement.dataset.theme=t;</script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
  <style>
    /* Catppuccin Mocha — dark OS default or explicit override */
    @media (prefers-color-scheme: dark) { :root { --ctp-base:#1e1e2e;--ctp-mantle:#181825;--ctp-crust:#11111b;--ctp-surface0:#313244;--ctp-surface1:#45475a;--ctp-surface2:#585b70;--ctp-overlay0:#6c7086;--ctp-text:#cdd6f4;--ctp-subtext:#a6adc8;--ctp-mauve:#cba6f7;--ctp-lavender:#b4befe;--ctp-blue:#89b4fa;--ctp-green:#a6e3a1;--ctp-peach:#fab387;--ctp-red:#f38ba8;--ctp-yellow:#f9e2af;--badge-blue-bg:rgba(137,180,250,0.12);--badge-peach-bg:rgba(250,179,135,0.12);--summary-hover:rgba(203,166,247,0.08); } }
    html[data-theme="dark"] { --ctp-base:#1e1e2e;--ctp-mantle:#181825;--ctp-crust:#11111b;--ctp-surface0:#313244;--ctp-surface1:#45475a;--ctp-surface2:#585b70;--ctp-overlay0:#6c7086;--ctp-text:#cdd6f4;--ctp-subtext:#a6adc8;--ctp-mauve:#cba6f7;--ctp-lavender:#b4befe;--ctp-blue:#89b4fa;--ctp-green:#a6e3a1;--ctp-peach:#fab387;--ctp-red:#f38ba8;--ctp-yellow:#f9e2af;--badge-blue-bg:rgba(137,180,250,0.12);--badge-peach-bg:rgba(250,179,135,0.12);--summary-hover:rgba(203,166,247,0.08); }

    /* Catppuccin Latte — light OS default or explicit override */
    @media (prefers-color-scheme: light) { :root { --ctp-base:#eff1f5;--ctp-mantle:#e6e9ef;--ctp-crust:#dce0e8;--ctp-surface0:#ccd0da;--ctp-surface1:#bcc0cc;--ctp-surface2:#acb0be;--ctp-overlay0:#9ca0b0;--ctp-text:#4c4f69;--ctp-subtext:#6c6f85;--ctp-mauve:#8839ef;--ctp-lavender:#7287fd;--ctp-blue:#1e66f5;--ctp-green:#40a02b;--ctp-peach:#fe640b;--ctp-red:#d20f39;--ctp-yellow:#df8e1d;--badge-blue-bg:rgba(30,102,245,0.10);--badge-peach-bg:rgba(254,100,11,0.10);--summary-hover:rgba(136,57,239,0.07); } }
    html[data-theme="light"] { --ctp-base:#eff1f5;--ctp-mantle:#e6e9ef;--ctp-crust:#dce0e8;--ctp-surface0:#ccd0da;--ctp-surface1:#bcc0cc;--ctp-surface2:#acb0be;--ctp-overlay0:#9ca0b0;--ctp-text:#4c4f69;--ctp-subtext:#6c6f85;--ctp-mauve:#8839ef;--ctp-lavender:#7287fd;--ctp-blue:#1e66f5;--ctp-green:#40a02b;--ctp-peach:#fe640b;--ctp-red:#d20f39;--ctp-yellow:#df8e1d;--badge-blue-bg:rgba(30,102,245,0.10);--badge-peach-bg:rgba(254,100,11,0.10);--summary-hover:rgba(136,57,239,0.07); }

    :root {
      --pico-background-color: var(--ctp-base);
      --pico-card-background-color: var(--ctp-mantle);
      --pico-color: var(--ctp-text);
      --pico-muted-color: var(--ctp-subtext);
      --pico-muted-border-color: var(--ctp-surface1);
      --pico-primary: var(--ctp-mauve);
      --pico-primary-hover: var(--ctp-lavender);
      --pico-primary-focus: rgba(203, 166, 247, 0.25);
      --pico-primary-inverse: var(--ctp-crust);
      --pico-secondary: var(--ctp-surface1);
      --pico-secondary-hover: var(--ctp-surface2);
      --pico-contrast: var(--ctp-text);
      --pico-border-color: var(--ctp-surface1);
      --pico-table-border-color: var(--ctp-surface0);
      --pico-table-row-stripped-background-color: rgba(0, 0, 0, 0.04);
      --pico-form-element-background-color: var(--ctp-surface0);
      --pico-form-element-border-color: var(--ctp-surface1);
      --pico-form-element-color: var(--ctp-text);
      --pico-form-element-placeholder-color: var(--ctp-overlay0);
      --pico-form-element-active-border-color: var(--ctp-mauve);
      --pico-form-element-focus-color: var(--pico-primary-focus);
      --pico-del-color: var(--ctp-red);
      --pico-ins-color: var(--ctp-green);
      --pico-mark-background-color: var(--ctp-yellow);
      --pico-mark-color: var(--ctp-crust);
      --pico-code-background-color: var(--ctp-mantle);
      --pico-code-color: var(--ctp-green);
    }

    body { background-color: var(--ctp-base); color: var(--ctp-text); }

    header {
      background-color: var(--ctp-mantle);
      border-bottom: 1px solid var(--ctp-surface0);
      padding-top: 0.75rem;
      padding-bottom: 0.75rem;
    }

    header nav strong { color: var(--ctp-mauve); font-size: 1.1rem; letter-spacing: 0.02em; }

    header nav a {
      color: var(--ctp-subtext);
      text-decoration: none;
      transition: color 150ms;
    }

    header nav a:hover { color: var(--ctp-lavender); }

    #theme-toggle {
      background: none;
      border: 1px solid var(--ctp-surface1);
      color: var(--ctp-subtext);
      cursor: pointer;
      padding: 0.2em 0.55em;
      border-radius: 6px;
      font-size: 0.85rem;
      line-height: 1.5;
      transition: border-color 150ms, color 150ms;
      margin: 0;
    }

    #theme-toggle:hover { border-color: var(--ctp-mauve); color: var(--ctp-mauve); }

    .platform-badge {
      font-size: 0.75em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ctp-blue);
      background: var(--badge-blue-bg);
      padding: 0.15em 0.5em;
      border-radius: 4px;
    }

    .game-type-badge {
      font-size: 0.7em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ctp-peach);
      background: var(--badge-peach-bg);
      padding: 0.15em 0.5em;
      border-radius: 4px;
    }

    table { width: 100%; }

    table thead th {
      color: var(--ctp-subtext);
      font-size: 0.8em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      border-bottom-color: var(--ctp-surface1);
    }

    details summary[role="button"].outline { color: var(--ctp-mauve); border-color: var(--ctp-surface1); }
    details summary[role="button"].outline:hover { border-color: var(--ctp-mauve); background: var(--summary-hover); }

    .htmx-indicator { opacity: 0; transition: opacity 200ms; }
    .htmx-request .htmx-indicator { opacity: 1; }
  </style>
</head>
<body>
  <header class="container">
    <nav>
      <ul>
        <li><strong>Completed Games Tracker</strong></li>
      </ul>
      <ul>
        <li><a href="/library">Library</a></li>
        <li><a href="/completions">Completions</a></li>
        <li><a href="/logout">{{ current_user.name }}</a></li>
        <li>
          <button id="theme-toggle" aria-label="Toggle theme" title="Toggle theme"></button>
        </li>
      </ul>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script>
    (function () {
      const html = document.documentElement;
      const btn = document.getElementById('theme-toggle');

      function getEffective() {
        if (html.dataset.theme) return html.dataset.theme;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      function updateButton(theme) {
        btn.textContent = theme === 'dark' ? '☀' : '☾';
        btn.title = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
      }

      updateButton(getEffective());

      btn.addEventListener('click', function () {
        const next = getEffective() === 'dark' ? 'light' : 'dark';
        html.dataset.theme = next;
        localStorage.setItem('theme', next);
        updateButton(next);
      });
    })();
  </script>
</body>
</html>
