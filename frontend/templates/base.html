<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{% endblock %} — Completed Games Tracker</title>
  <script>document.documentElement.dataset.theme=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');</script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/css/theme.css">
  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
</head>
<body>
  <header>
    <nav class="container">
      <ul>
        <li><strong>Completed Games Tracker</strong></li>
      </ul>
      <ul>
        <li><a href="/library">Library</a></li>
        <li><a href="/completions">Completions</a></li>
        <li>
          <details class="dropdown">
            <summary>{{ current_user.name }}</summary>
            <ul>
              <li><a href="/account">Settings</a></li>
              <li><a href="/logout">Sign out</a></li>
            </ul>
          </details>
        </li>
      </ul>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
