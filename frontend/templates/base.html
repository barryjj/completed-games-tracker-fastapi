<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{% endblock %} — Completed Games Tracker</title>
  <script>const t=localStorage.getItem('theme');if(t)document.documentElement.dataset.theme=t;</script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/css/theme.css">
  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
</head>
<body>
  <header class="container">
    <nav>
      <ul>
        <li><strong>Completed Games Tracker</strong></li>
      </ul>
      <ul>
        <li><a href="/library">Library</a></li>
        <li><a href="/completions">Completions</a></li>
        <li><a href="/account">{{ current_user.name }}</a></li>
        <li><a href="/logout">Sign out</a></li>
      </ul>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
