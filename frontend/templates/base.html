<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{% endblock %} — Completed Games Tracker</title>
  <script>document.documentElement.dataset.bsTheme=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');</script>
  <link rel="stylesheet" href="/static/vendor/bootstrap.min.css">
  <link rel="stylesheet" href="/static/css/theme.css">
  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
  <script src="/static/vendor/bootstrap.bundle.min.js" defer></script>
</head>
<body>
  <nav class="navbar border-bottom">
    <div class="container">
      <a class="navbar-brand" href="/">Completed Games Tracker</a>
      <div class="d-flex align-items-center gap-1">
        <a class="nav-link px-3" href="/library">Library</a>
        <a class="nav-link px-3" href="/completions">Completions</a>
        <div class="dropdown">
          <button class="nav-link px-3 dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
            {{ current_user.name }}
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="/account">Settings</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="/logout">Sign out</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>
  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
