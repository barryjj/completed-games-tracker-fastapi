<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In — Completed Games Tracker</title>
  <script>const t=localStorage.getItem('theme');if(t)document.documentElement.dataset.theme=t;</script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/css/theme.css">
</head>
<body class="auth-page">
  <main class="container">
    <article class="auth-card">
      <p class="app-name">Completed Games Tracker</p>
      <h3>Sign In</h3>
      {% if error %}
      <p><small style="color: var(--ctp-red)">{{ error }}</small></p>
      {% endif %}
      <form method="post" action="/login">
        <label>
          Username
          <input type="text" name="username" autocomplete="username" required autofocus>
        </label>
        <label>
          Password
          <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <button type="submit" class="contrast">Sign In</button>
      </form>
      <small>No account? <a href="/signup">Create one</a>.</small>
    </article>
  </main>
</body>
</html>
