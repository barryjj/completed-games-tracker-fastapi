<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In — Completed Games Tracker</title>
  <script>document.documentElement.dataset.bsTheme=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');</script>
  <link rel="stylesheet" href="/static/vendor/bootstrap.min.css">
  <link rel="stylesheet" href="/static/css/theme.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
  <div class="card auth-card">
    <div class="card-body p-4">
      <p class="app-name mb-1">Completed Games Tracker</p>
      <h3 class="mb-4">Sign In</h3>
      {% if error %}
      <p class="text-danger mb-3"><small>{{ error }}</small></p>
      {% endif %}
      <form method="post" action="/login">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" name="username" autocomplete="username" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 mt-1">Sign In</button>
      </form>
      <small class="text-secondary">No account? <a href="/signup">Create one</a>.</small>
    </div>
  </div>
</body>
</html>
