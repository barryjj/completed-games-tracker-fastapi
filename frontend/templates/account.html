{% extends "base.html" %}
{% block title %}Account{% endblock %}

{% block content %}
<div style="max-width: 480px;">

  <nav class="account-tabs">
    <a href="#" class="tab-btn active" data-tab="profile">Profile</a>
    <a href="#" class="tab-btn" data-tab="security">Security</a>
    <a href="#" class="tab-btn" data-tab="appearance">Appearance</a>
  </nav>

  <!-- Profile -->
  <div id="tab-profile" class="tab-panel">
    <h4>Display Name</h4>
    <form hx-post="/account/display-name" hx-target="#flash-display-name" hx-swap="innerHTML">
      <div class="field-row">
        <input type="text" name="name" value="{{ current_user.name }}" required>
        <button type="submit" class="outline">Save</button>
      </div>
      <div id="flash-display-name" class="flash-slot"></div>
    </form>
  </div>

  <!-- Security -->
  <div id="tab-security" class="tab-panel" hidden>
    <h4>Username</h4>
    <form hx-post="/account/username" hx-target="#flash-username" hx-swap="innerHTML">
      <label>
        New username
        <input type="text" name="new_username" value="{{ current_user.username }}" autocomplete="username" required>
      </label>
      <label>
        Current password
        <input type="password" name="current_password" autocomplete="current-password" required>
      </label>
      <div id="flash-username" class="flash-slot"></div>
      <button type="submit" class="outline" style="width: auto;">Save</button>
    </form>

    <hr>

    <h4>Password</h4>
    <form
      hx-post="/account/password"
      hx-target="#flash-password"
      hx-swap="innerHTML"
      hx-on::after-request="if(event.detail.successful) this.reset()"
    >
      <label>
        Current password
        <input type="password" name="current_password" autocomplete="current-password" required>
      </label>
      <label>
        New password
        <input type="password" name="new_password" autocomplete="new-password" required>
      </label>
      <label>
        Confirm new password
        <input type="password" name="new_password_confirm" autocomplete="new-password" required>
      </label>
      <div id="flash-password" class="flash-slot"></div>
      <button type="submit" class="outline" style="width: auto;">Change Password</button>
    </form>

    <hr>

    <h4 style="color: var(--ctp-red);">Delete Account</h4>
    <p><small>Permanently deletes your account, library, and all completions. Type your username to confirm.</small></p>
    <form
      hx-post="/account/delete"
      hx-target="#flash-delete"
      hx-swap="innerHTML"
      hx-confirm="Are you absolutely sure? This cannot be undone."
    >
      <div class="field-row">
        <input type="text" name="confirm_username" placeholder="{{ current_user.username }}" autocomplete="off" required>
        <button type="submit" class="outline" style="color: var(--ctp-red); border-color: var(--ctp-red); white-space: nowrap; width: auto;">
          Delete Account
        </button>
      </div>
      <div id="flash-delete" class="flash-slot"></div>
    </form>
  </div>

  <!-- Appearance -->
  <div id="tab-appearance" class="tab-panel" hidden>
    <h4>Color Theme</h4>
    <div class="theme-picker" id="theme-picker">
      <button type="button" class="theme-picker-trigger" aria-haspopup="listbox" aria-expanded="false">
        System default
      </button>
      <ul class="theme-picker-menu" role="listbox" hidden>
        <li role="option"><button type="button" data-value="system">System default</button></li>
        <li role="option"><button type="button" data-value="dark">Dark (Catppuccin Mocha)</button></li>
        <li role="option"><button type="button" data-value="light">Light (Catppuccin Latte)</button></li>
      </ul>
    </div>
    <script>
      (function () {
        var labels = { system: 'System default', dark: 'Dark (Catppuccin Mocha)', light: 'Light (Catppuccin Latte)' };
        var picker  = document.getElementById('theme-picker');
        var trigger = picker.querySelector('.theme-picker-trigger');
        var menu    = picker.querySelector('.theme-picker-menu');
        var current = localStorage.getItem('theme') || 'system';

        function applyTheme(val) {
          if (val === 'system') {
            localStorage.removeItem('theme');
            document.documentElement.dataset.theme =
              matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          } else {
            document.documentElement.dataset.theme = val;
            localStorage.setItem('theme', val);
          }
          trigger.textContent = labels[val];
          menu.querySelectorAll('button').forEach(function (b) {
            b.setAttribute('aria-selected', b.dataset.value === val ? 'true' : 'false');
          });
          current = val;
        }

        applyTheme(current);

        trigger.addEventListener('click', function () {
          var open = !menu.hidden;
          menu.hidden = open;
          trigger.setAttribute('aria-expanded', !open);
        });

        menu.querySelectorAll('button').forEach(function (b) {
          b.addEventListener('click', function () {
            applyTheme(b.dataset.value);
            menu.hidden = true;
            trigger.setAttribute('aria-expanded', 'false');
          });
        });

        document.addEventListener('click', function (e) {
          if (!picker.contains(e.target)) {
            menu.hidden = true;
            trigger.setAttribute('aria-expanded', 'false');
          }
        });
      })();
    </script>
  </div>

</div>

<script>
  (function () {
    const tabs = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.tab-panel');
    tabs.forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.preventDefault();
        tabs.forEach(function (t) { t.classList.remove('active'); });
        panels.forEach(function (p) { p.hidden = true; });
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).hidden = false;
      });
    });
  })();
</script>
{% endblock %}
