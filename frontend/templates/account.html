{% extends "base.html" %}
{% block title %}Account{% endblock %}

{% block content %}
<div style="max-width: 520px;">

  <ul class="nav nav-tabs mb-4" id="account-tabs">
    <li class="nav-item">
      <a class="nav-link active" href="#" data-tab="profile">Profile</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="#" data-tab="security">Security</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="#" data-tab="appearance">Appearance</a>
    </li>
  </ul>

  <!-- Profile -->
  <div id="tab-profile" class="tab-pane">
    <p class="section-heading">Display Name</p>
    <form hx-post="/account/display-name" hx-target="#flash-display-name" hx-swap="innerHTML">
      <div class="input-group mb-1">
        <input type="text" class="form-control" name="name" value="{{ current_user.name }}" required>
        <button type="submit" class="btn btn-outline-secondary">Save</button>
      </div>
      <div id="flash-display-name" class="flash-slot"></div>
    </form>
  </div>

  <!-- Security -->
  <div id="tab-security" class="tab-pane" hidden>
    <p class="section-heading">Username</p>
    <form hx-post="/account/username" hx-target="#flash-username" hx-swap="innerHTML">
      <div class="mb-3">
        <label class="form-label">New username</label>
        <input type="text" class="form-control" name="new_username" value="{{ current_user.username }}" autocomplete="username" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Current password</label>
        <input type="password" class="form-control" name="current_password" autocomplete="current-password" required>
      </div>
      <div id="flash-username" class="flash-slot mb-2"></div>
      <button type="submit" class="btn btn-outline-secondary" style="width: auto;">Save</button>
    </form>

    <hr>

    <p class="section-heading">Password</p>
    <form
      hx-post="/account/password"
      hx-target="#flash-password"
      hx-swap="innerHTML"
      hx-on::after-request="if(event.detail.successful) this.reset()"
    >
      <div class="mb-3">
        <label class="form-label">Current password</label>
        <input type="password" class="form-control" name="current_password" autocomplete="current-password" required>
      </div>
      <div class="mb-3">
        <label class="form-label">New password</label>
        <input type="password" class="form-control" name="new_password" autocomplete="new-password" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm new password</label>
        <input type="password" class="form-control" name="new_password_confirm" autocomplete="new-password" required>
      </div>
      <div id="flash-password" class="flash-slot mb-2"></div>
      <button type="submit" class="btn btn-outline-secondary" style="width: auto;">Change Password</button>
    </form>

    <hr>

    <p class="section-heading" style="color: var(--ctp-red);">Delete Account</p>
    <p class="text-secondary"><small>Permanently deletes your account, library, and all completions. Type your username to confirm.</small></p>
    <form
      hx-post="/account/delete"
      hx-target="#flash-delete"
      hx-swap="innerHTML"
      hx-confirm="Are you absolutely sure? This cannot be undone."
    >
      <div class="input-group mb-1">
        <input type="text" class="form-control" name="confirm_username" placeholder="{{ current_user.username }}" autocomplete="off" required>
        <button type="submit" class="btn btn-outline-danger" style="white-space: nowrap;">Delete Account</button>
      </div>
      <div id="flash-delete" class="flash-slot"></div>
    </form>
  </div>

  <!-- Appearance -->
  <div id="tab-appearance" class="tab-pane" hidden>
    <p class="section-heading">Color Theme</p>
    <div class="theme-picker" id="theme-picker">
      <button type="button" class="theme-picker-trigger" aria-haspopup="listbox" aria-expanded="false">
        System default
      </button>
      <ul class="theme-picker-menu" role="listbox" hidden>
        <li role="option"><button type="button" data-value="system">System default</button></li>
        <li role="option"><button type="button" data-value="dark">Dark (Catppuccin Mocha)</button></li>
        <li role="option"><button type="button" data-value="light">Light (Catppuccin Latte)</button></li>
      </ul>
    </div>
    <script>
      (function () {
        var labels = { system: 'System default', dark: 'Dark (Catppuccin Mocha)', light: 'Light (Catppuccin Latte)' };
        var picker  = document.getElementById('theme-picker');
        var trigger = picker.querySelector('.theme-picker-trigger');
        var menu    = picker.querySelector('.theme-picker-menu');
        var current = localStorage.getItem('theme') || 'system';

        function applyTheme(val) {
          if (val === 'system') {
            localStorage.removeItem('theme');
            document.documentElement.dataset.bsTheme =
              matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          } else {
            document.documentElement.dataset.bsTheme = val;
            localStorage.setItem('theme', val);
          }
          trigger.textContent = labels[val];
          menu.querySelectorAll('button').forEach(function (b) {
            b.setAttribute('aria-selected', b.dataset.value === val ? 'true' : 'false');
          });
          current = val;
        }

        applyTheme(current);

        trigger.addEventListener('click', function () {
          var open = !menu.hidden;
          menu.hidden = open;
          trigger.setAttribute('aria-expanded', !open);
        });

        menu.querySelectorAll('button').forEach(function (b) {
          b.addEventListener('click', function () {
            applyTheme(b.dataset.value);
            menu.hidden = true;
            trigger.setAttribute('aria-expanded', 'false');
          });
        });

        document.addEventListener('click', function (e) {
          if (!picker.contains(e.target)) {
            menu.hidden = true;
            trigger.setAttribute('aria-expanded', 'false');
          }
        });
      })();
    </script>
  </div>

</div>

<script>
  (function () {
    var tabs = document.querySelectorAll('#account-tabs .nav-link');
    var panels = document.querySelectorAll('.tab-pane');
    tabs.forEach(function (link) {
      link.addEventListener('click', function (e) {
        e.preventDefault();
        tabs.forEach(function (t) { t.classList.remove('active'); });
        panels.forEach(function (p) { p.hidden = true; });
        link.classList.add('active');
        document.getElementById('tab-' + link.dataset.tab).hidden = false;
      });
    });
  })();
</script>
{% endblock %}
