{% extends "base.html" %}
{% block title %}Account{% endblock %}

{% block content %}
<h1>Account Settings</h1>

<div style="max-width: 520px;">

  <section>
    <h3>Display Name</h3>
    <form hx-post="/account/display-name" hx-target="#flash-display-name" hx-swap="innerHTML">
      <div style="display:flex; gap:0.5rem; align-items:flex-end;">
        <label style="flex:1; margin:0;">
          <input type="text" name="name" value="{{ current_user.name }}" required>
        </label>
        <button type="submit" style="width:auto; margin:0;">Save</button>
      </div>
      <div id="flash-display-name" style="min-height:1.2em; margin-top:0.25rem;"></div>
    </form>
  </section>

  <hr>

  <section>
    <h3>Username</h3>
    <form hx-post="/account/username" hx-target="#flash-username" hx-swap="innerHTML">
      <label>
        New username
        <input type="text" name="new_username" value="{{ current_user.username }}" autocomplete="username" required>
      </label>
      <label>
        Current password
        <input type="password" name="current_password" autocomplete="current-password" required>
      </label>
      <div id="flash-username" style="min-height:1.2em;"></div>
      <button type="submit" style="width:auto;">Save</button>
    </form>
  </section>

  <hr>

  <section>
    <h3>Password</h3>
    <form
      hx-post="/account/password"
      hx-target="#flash-password"
      hx-swap="innerHTML"
      hx-on::after-request="if(event.detail.successful) this.reset()"
    >
      <label>
        Current password
        <input type="password" name="current_password" autocomplete="current-password" required>
      </label>
      <label>
        New password
        <input type="password" name="new_password" autocomplete="new-password" required>
      </label>
      <label>
        Confirm new password
        <input type="password" name="new_password_confirm" autocomplete="new-password" required>
      </label>
      <div id="flash-password" style="min-height:1.2em;"></div>
      <button type="submit" style="width:auto;">Change Password</button>
    </form>
  </section>

  <hr>

  <section>
    <h3>Theme</h3>
    <label>
      Color scheme
      <select id="theme-select">
        <option value="system">System default</option>
        <option value="dark">Dark (Catppuccin Mocha)</option>
        <option value="light">Light (Catppuccin Latte)</option>
      </select>
    </label>
    <script>
      (function () {
        const sel = document.getElementById('theme-select');
        const html = document.documentElement;
        sel.value = localStorage.getItem('theme') || 'system';
        sel.addEventListener('change', function () {
          if (this.value === 'system') {
            delete html.dataset.theme;
            localStorage.removeItem('theme');
          } else {
            html.dataset.theme = this.value;
            localStorage.setItem('theme', this.value);
          }
        });
      })();
    </script>
  </section>

  <hr>

  <section>
    <h3 style="color: var(--ctp-red);">Danger Zone</h3>
    <p><small>Permanently deletes your account, library, and all completions. Type your username to confirm.</small></p>
    <form
      hx-post="/account/delete"
      hx-target="#flash-delete"
      hx-swap="innerHTML"
      hx-confirm="Are you absolutely sure? This cannot be undone."
    >
      <div style="display:flex; gap:0.5rem; align-items:flex-end;">
        <label style="flex:1; margin:0;">
          <input type="text" name="confirm_username" placeholder="{{ current_user.username }}" autocomplete="off" required>
        </label>
        <button type="submit" class="outline" style="width:auto; margin:0; color:var(--ctp-red); border-color:var(--ctp-red);">Delete Account</button>
      </div>
      <div id="flash-delete" style="min-height:1.2em; margin-top:0.25rem;"></div>
    </form>
  </section>

</div>
{% endblock %}
