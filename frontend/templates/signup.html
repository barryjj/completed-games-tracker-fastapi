<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Account — Completed Games Tracker</title>
  <script>document.documentElement.dataset.theme=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');</script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/css/theme.css">
</head>
<body class="auth-page">
  <main class="container">
    <article class="auth-card">
      <p class="app-name">Completed Games Tracker</p>
      <h3>Create Account</h3>
      {% if error %}
      <p><small style="color: var(--ctp-red)">{{ error }}</small></p>
      {% endif %}
      <form method="post" action="/signup">
        <label>
          Username
          <input type="text" name="username" value="{{ username or '' }}" autocomplete="username" required autofocus>
        </label>
        <label>
          Password
          <input type="password" name="password" autocomplete="new-password" required>
        </label>
        <label>
          Confirm Password
          <input type="password" name="password_confirm" autocomplete="new-password" required>
        </label>
        <button type="submit">Create Account</button>
      </form>
      <small>Already have an account? <a href="/login">Sign in</a>.</small>
    </article>
  </main>
</body>
</html>
