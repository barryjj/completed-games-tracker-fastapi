<tr id="completion-{{ completion.id }}">
  <td class="row-num"></td>
  <td>{{ completion.library_entry.release.game.display_title }}</td>
  <td><span class="platform-badge">{{ completion.library_entry.release.platform }}</span></td>
  <td>{{ completion.completed_at.strftime("%Y-%m-%d") }}</td>
  <td>{{ completion.playthroughs or "" }}</td>
  <td>{{ completion.notes or "" }}</td>
  <td class="text-end text-nowrap">
    <button
      class="btn btn-sm btn-outline-secondary"
      onclick="editCompletion(this.dataset)"
      data-completion-id="{{ completion.id }}"
      data-entry-id="{{ completion.library_entry_id }}"
      data-label="{{ (completion.library_entry.release.game.display_title ~ ' (' ~ completion.library_entry.release.platform ~ ')') | e }}"
      data-date="{{ completion.completed_at.strftime('%Y-%m-%d') }}"
      data-playthroughs="{{ (completion.playthroughs or '') | e }}"
      data-notes="{{ (completion.notes or '') | e }}"
    >Edit</button>
    <button
      class="btn btn-sm btn-danger"
      hx-delete="/completions/{{ completion.id }}"
      hx-target="#completion-{{ completion.id }}"
      hx-swap="outerHTML"
      hx-confirm="Delete this completion?"
    >Delete</button>
  </td>
</tr>
