{# Reusable toast partial.
   Expected context:
     - kind:  "success" or "danger"
     - body:  message text
   Renders a single toast element with OOB swap into #toast-container. #}
<div class="toast toast-{{ kind }} align-items-center"
     role="alert"
     aria-live="{{ 'assertive' if kind == 'danger' else 'polite' }}"
     aria-atomic="true"
     hx-swap-oob="beforeend:#toast-container">
  <div class="d-flex">
    <div class="toast-body">{{ body }}</div>
    <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
  </div>
</div>
