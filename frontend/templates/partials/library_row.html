<tr id="library-entry-{{ entry.id }}">
  <td>{{ entry.release.game.display_title }}</td>
  <td><span class="platform-badge">{{ entry.release.platform }}</span></td>
  <td>
    {% if entry.release.game.is_dlc %}
      <span class="game-type-badge">DLC</span>
    {% elif entry.release.game.is_collection %}
      <span class="game-type-badge">Collection</span>
    {% elif entry.release.game.parent_id %}
      <span class="game-type-badge badge-in-collection">In collection</span>
    {% endif %}
  </td>
  <td><small>{{ entry.imported_at.strftime("%Y-%m-%d") }}</small></td>
  <td class="text-end text-nowrap">
    <div class="row-actions">
      <button
        class="btn btn-sm btn-outline-secondary"
        onclick="editLibraryEntry(this.dataset)"
        data-entry-id="{{ entry.id }}"
        data-display-name="{{ (entry.release.game.display_name or '') | e }}"
        data-is-dlc="{{ 'true' if entry.release.game.is_dlc else 'false' }}"
        data-is-collection="{{ 'true' if entry.release.game.is_collection else 'false' }}"
        data-is-part-of-collection="{{ 'true' if (entry.release.game.parent_id and not entry.release.game.is_dlc) else 'false' }}"
        data-parent-id="{{ entry.release.game.parent_id or '' }}"
        data-label="{{ entry.release.game.display_title | e }}"
      >Edit</button>
      <button
        class="btn btn-sm btn-danger"
        hx-delete="/library/entries/{{ entry.id }}"
        hx-target="#library-entry-{{ entry.id }}"
        hx-swap="outerHTML"
        hx-confirm="Remove {{ entry.release.game.display_title | e }} from your library?"
      >Remove</button>
    </div>
  </td>
</tr>
