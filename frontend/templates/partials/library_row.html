<tr id="library-entry-{{ entry.id }}">
  <td>{{ entry.release.game.title }}</td>
  <td><span class="platform-badge">{{ entry.release.platform }}</span></td>
  <td>
    {% if entry.release.game.is_dlc %}<span class="game-type-badge">DLC</span>{% endif %}
    {% if entry.release.game.is_collection %}<span class="game-type-badge">Collection</span>{% endif %}
    {% if entry.release.game.parent %}<span class="parent-badge">{{ entry.release.game.parent.title }}</span>{% endif %}
  </td>
  <td><small>{{ entry.imported_at.strftime("%Y-%m-%d") }}</small></td>
</tr>
