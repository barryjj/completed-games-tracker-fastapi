{% if results %}
<ul class="list-group list-group-flush border rounded">
  {% for entry in results %}
  <li
    class="list-group-item list-group-item-action"
    style="cursor:pointer"
    onclick="selectCompletionGame({{ entry.id }}, '{{ entry.release.game.display_title | e }} ({{ entry.release.display_platform | e }})')"
  >
    {{ entry.release.game.display_title }} <span class="text-secondary">{{ entry.release.display_platform }}</span>
  </li>
  {% endfor %}
</ul>
{% endif %}
