{% if results %}
<ul class="list-group list-group-flush border rounded cgt-search-results">
  {% for entry in results %}
  <li
    class="list-group-item list-group-item-action"
    style="cursor:pointer"
    data-cgt-id="{{ entry.id }}"
    data-cgt-label="{{ entry.release.game.display_title | e }} ({{ entry.release.display_platform | e }})"
    onclick="selectCompletionGame(this.dataset.cgtId, this.dataset.cgtLabel); return false;"
  >
    {% set _yr = entry.release | release_year %}
    {{ entry.release.game.display_title }} <span class="text-secondary">{{ entry.release.display_platform }}{% if _yr %} · {{ _yr }}{% endif %}</span>
  </li>
  {% endfor %}
</ul>
{% endif %}
