{% if entries %}
<div class="list-group">
  {% for entry in entries %}
  <button type="button" class="list-group-item list-group-item-action text-start"
          {# Label rides in a data attribute — HTML-escaping is correct there,
             whereas inside a JS string literal an apostrophe in the title
             (STREET FIGHTER II') decodes and shatters the onclick. #}
          data-cgt-id="{{ entry.id if id_field == 'entry' else entry.release.id }}"
          data-cgt-label="{{ entry.release.game.display_title | e }} ({{ entry.release.display_platform | e }})"
          onclick="{{ callback | default('selectLibraryParent') }}(this.dataset.cgtId, this.dataset.cgtLabel); return false;">
    {{ entry.release.game.display_title }}
    <small class="text-secondary">({{ entry.release.display_platform }})</small>
  </button>
  {% endfor %}
</div>
{% else %}
<div class="text-secondary"><small>No matches found</small></div>
{% endif %}
