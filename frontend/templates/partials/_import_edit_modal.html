{# Edit modal body for a pending import candidate. Lets the user fix the
   raw title/platform and re-run the matcher, or manually link straight to
   a specific existing library entry (skipping the matcher entirely) for
   cases it should catch but doesn't. #}
<form id="import-edit-form"
      hx-post="/library/import/{{ candidate.id }}/edit"
      hx-swap="none"
      hx-on::after-request="if(event.detail.successful){ bootstrap.Modal.getInstance(document.getElementById('importEditModal')).hide(); }">
  <div class="mb-3">
    <label class="form-label">Title</label>
    <input type="text" class="form-control" name="raw_title" value="{{ candidate.raw_title | e }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Platform</label>
    <input type="text" class="form-control" name="raw_platform"
           value="{{ candidate.raw_platform | e }}" list="import-edit-platform-suggestions">
    <datalist id="import-edit-platform-suggestions">
      {% for p in platforms %}
      <option value="{{ p.display_title | e }}">
      {% endfor %}
    </datalist>
  </div>

  <div class="mb-2">
    <label class="form-label mb-1">Link to a specific library entry <span class="text-secondary fw-normal">(optional — skips automatic matching)</span></label>
    <input type="text" class="form-control form-control-sm mb-2" id="import-edit-link-search" placeholder="Search your library…" autocomplete="off">
    <div id="import-edit-link-results"></div>
    <div id="import-edit-link-selected" class="small text-secondary mt-1" hidden>
      Linking to: <span id="import-edit-link-selected-label" class="text-body"></span>
      <button type="button" class="btn btn-link btn-sm p-0 ms-1" onclick="clearImportEditLink()">Clear</button>
    </div>
    <input type="hidden" name="library_entry_id" id="import-edit-link-id">
  </div>

  <div class="d-flex justify-content-end gap-2">
    <button type="button" class="btn btn-surface" data-bs-dismiss="modal">Cancel</button>
    <button type="submit" class="btn btn-primary">Save</button>
  </div>
</form>

<script>
(function() {
  var searchInput = document.getElementById('import-edit-link-search');
  var resultsDiv = document.getElementById('import-edit-link-results');
  if (!searchInput || !resultsDiv) return;
  var timer = null;
  searchInput.addEventListener('input', function() {
    var q = this.value.trim();
    clearTimeout(timer);
    resultsDiv.innerHTML = '';
    if (!q) return;
    timer = setTimeout(function() {
      htmx.ajax('GET', '/library/games/search?id_field=entry&callback=selectImportEditLink&q=' + encodeURIComponent(q), {
        target: '#import-edit-link-results',
        swap: 'innerHTML',
      });
    }, 300);
  });
})();

window.selectImportEditLink = function(entryId, label) {
  document.getElementById('import-edit-link-id').value = entryId;
  document.getElementById('import-edit-link-selected-label').textContent = label;
  document.getElementById('import-edit-link-selected').hidden = false;
  document.getElementById('import-edit-link-search').value = '';
  document.getElementById('import-edit-link-results').innerHTML = '';
};

window.clearImportEditLink = function() {
  document.getElementById('import-edit-link-id').value = '';
  document.getElementById('import-edit-link-selected').hidden = true;
};
</script>
